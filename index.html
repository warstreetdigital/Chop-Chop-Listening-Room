<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chop Chop — Sonic Showroom</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    height:100vh;
    background:linear-gradient(180deg,#0a0a0a,#111);
    color:#fff;
    font-family:Inter,sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    overflow:hidden;
}

/* ambient glow */
body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:radial-gradient(circle, rgba(128,0,0,0.3), transparent 60%);
    filter:blur(80px);
    top:20%;
    left:50%;
    transform:translateX(-50%);
}

/* container */
.container{
    position:relative;
    max-width:700px;
    padding:40px;
}

/* title */
h1{
    font-family:'Playfair Display', serif;
    font-size:48px;
    letter-spacing:2px;
    margin-bottom:10px;
}

/* tag */
.tag{
    font-size:13px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:#aaa;
    margin-bottom:40px;
}

/* divider */
.line{
    width:60px;
    height:2px;
    background:linear-gradient(90deg,transparent,#fff,transparent);
    margin:30px auto;
    opacity:0.4;
}

/* main message */
.message{
    font-size:20px;
    font-weight:500;
    margin-bottom:20px;
}

/* sub message */
.sub{
    font-size:14px;
    color:#bbb;
    line-height:1.6;
}

/* button */
.btn{
    display:inline-block;
    margin-top:30px;
    padding:14px 28px;
    border-radius:30px;
    border:1px solid rgba(255,255,255,0.2);
    color:#fff;
    text-decoration:none;
    font-size:14px;
    transition:0.3s;
}

.btn:hover{
    background:#fff;
    color:#000;
}

/* status */
@keyframes pulse{
    0%{opacity:0.7}
    50%{opacity:1}
    100%{opacity:0.7}
}
.status{
    margin-top:15px;
    font-size:12px;
    letter-spacing:2px;
    color:#777;
    animation:pulse 2.5s infinite;
}
</style>
</head>

<body>

<div class="container">

    <h1>Chop Chop</h1>
    <div class="tag">Sonic Showroom</div>

    <div class="line"></div>

    <div class="message">
        Preview Window Closed
    </div>

    <div class="sub">
        The Chop Chop sonic experience was available for a limited preview.<br><br>
        The system is now being refined, structured, and aligned for full deployment.<br><br>
        This is not a playlist — this is a branded sound environment.
    </div>

    <div class="status">SHOWROOM OFFLINE</div>

    <a href="https://wa.me/263779388560" class="btn">
        Contact WarStreet
    </a>

</div>

</body>
</html>
